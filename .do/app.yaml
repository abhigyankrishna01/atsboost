name: ats-resume-optimizer
region: nyc

services:
  - name: web
    github:
      repo: abhigyankrishna01/atsboost
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 1
    # Puppeteer/Chromium needs headroom — 1GB OOMs under load. 2GB is safer.
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 15
      failure_threshold: 3
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_ID
        scope: RUN_TIME
        type: SECRET
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: CHROMIUM_PATH
        scope: RUN_TIME
        value: /usr/bin/chromium
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
    routes:
      - path: /
